<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/general.css">
    <link rel="stylesheet" href="style/addGoal.css">
    <title>Add Goal</title>
</head>
<body>
        <header>
            <h1 id="logo">GABO<i id="eOnLogo">e</i></h1>
            <div id="rightSide">
                <div id="userContainer">
                    <h3 id="userOther">logged in as: </h3>
                    <h1>Senne</h1>
                </div>
                <a id="logoutButton" href="index.html">[Logout]</a>
            </div>
        </header>
        <form action="goalList.html" id="addGoalForm" class="box">
            <a id="cancel" href="goalList.html">cancel</a>
                <div class="goalFormCol">
                    <div class="goalInput"></div>
                    <div class="goalInput">
                        <label>Goal Name</label>
                        <input type="text" id="goalName" name="goalName" placeholder=""></input>
                    </div>
                    <div class="goalInput"></div>
                </div>
    
                <div class="goalFormCol">
                    <div class="goalInput">
                        <label for="inCharge">Who is in charge</label>
                        <input type="text" id="inCharge" name="inCharge" placeholder=""></input>
                    </div>
                    <div class="goalInput">
                        <label for="timeEstimate">Time estimate</label>
                        <input type="text" id="timeEstimate" name="timeEstimate" placeholder=""></input>
                    </div>
                    <div class="goalInput">
                        <label for="dueDate">Due date</label>
                        <input type="date" id="dueDate" name="dueDate" placeholder=""></input>
                    </div>   
                </div>
                <div class="goalFormCol">
                    <div class="goalInput">
                        <label for="progressIndicator">indactors of progress</label>
                        <input type="text" id="progressIndicator" class="bigInput" name="progressIndicator" placeholder=""></input>
                    </div>
                    <div class="goalInput">
                        <label for="wayToAchieve">how the goal will be achieved</label>
                        <input type="text" id="wayToAchieve" class="bigInput" name="wayToAchieve" placeholder=""></input>
                    </div>
                    <div class="goalInput">
                        <label for="canBeAchieved">what realistically can be achieved</label>
                        <input type="text" id="canBeAchieved" class="bigInput" name="canBeAchieved" placeholder=""></input>
                    </div>
                </div>
                <div class="goalFormCol">
                    <div class="goalInput"></div>
                    <div class="goalInput">
                        <input type="submit" value="Create Goal"></input>
                    </div>
                    <div class="goalInput"></div>
                </div>   
        </form>
</body>
</html>
